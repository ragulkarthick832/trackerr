<!DOCTYPE html>
<html>
<head>
    <title>Water Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 420px;
            margin: auto;
            padding: 16px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            font-size: 16px;
            box-sizing: border-box;
        }

        .section {
            margin-bottom: 24px;
        }

        #summaryResult {
            font-weight: bold;
        }

        .danger {
            background: #d9534f;
            color: white;
            border: none;
        }

        #statusMessage {
            padding: 10px;
            margin-bottom: 16px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .loading {
            background: #fff3cd;
            color: #856404;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<h2>Water / Urine Tracker</h2>

<div id="statusMessage"></div>

<div class="section">
    <h3>Add Water</h3>
    <input id="waterInput" type="number" placeholder="Water in ml">
    <input id="waterTimestamp" type="datetime-local">
    <button onclick="addEntry('water')">Add Water</button>
</div>

<div class="section">
    <h3>Add Urine</h3>
    <input id="urineInput" type="number" placeholder="Urine in ml">
    <input id="urineTimestamp" type="datetime-local">
    <button onclick="addEntry('urine')">Add Urine</button>
</div>

<div class="section">
    <h3>Today's Timeline</h3>
    <canvas id="trackerChart"></canvas>
</div>

<div class="section">
    <h3>Custom Range</h3>
    <input id="startTime" type="datetime-local">
    <input id="endTime" type="datetime-local">
    <button onclick="fetchSummary()">Get Summary</button>

    <p id="summaryResult"></p>
</div>

<div class="section">
    <button class="danger" onclick="clearAll()">Clear All Entries</button>
</div>

<script>
let chart;

function showStatus(message, type) {
    const status = document.getElementById("statusMessage");
    status.innerText = message;
    status.className = type;
    status.style.display = "block";

    if (type !== "loading") {
        setTimeout(() => {
            status.style.display = "none";
        }, 2500);
    }
}

async function addEntry(type) {
    const quantity = parseInt(document.getElementById(type + "Input").value);
    const timestamp = document.getElementById(type + "Timestamp").value;

    if (!quantity || quantity <= 0) {
        showStatus("Enter valid quantity", "error");
        return;
    }

    try {
        showStatus("Adding entry...", "loading");

        await fetch("/add-entry", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                entry_type: type,
                quantity_ml: quantity,
                timestamp: timestamp || null
            })
        });

        document.getElementById(type + "Input").value = "";
        document.getElementById(type + "Timestamp").value = "";

        await loadChart();

        showStatus(`${type} entry added successfully`, "success");

    } catch {
        showStatus("Failed to add entry", "error");
    }
}

async function loadChart() {
    const res = await fetch("/daily-stats");
    const data = await res.json();

    const labels = data.map(x => x.time);

    const waterData = data.map(x =>
        x.entry_type === "water" ? x.quantity_ml : null
    );

    const urineData = data.map(x =>
        x.entry_type === "urine" ? x.quantity_ml : null
    );

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("trackerChart"), {
        type: "line",
        data: {
            labels,
            datasets: [
                {
                    label: "Water (ml)",
                    data: waterData,
                    borderColor: "blue",
                    backgroundColor: "blue",
                    tension: 0.2,
                    spanGaps: true
                },
                {
                    label: "Urine (ml)",
                    data: urineData,
                    borderColor: "green",
                    backgroundColor: "green",
                    tension: 0.2,
                    spanGaps: true
                }
            ]
        }
    });
}

async function fetchSummary() {
    const start = document.getElementById("startTime").value;
    const end = document.getElementById("endTime").value;

    if (!start || !end) {
        showStatus("Select both start and end", "error");
        return;
    }

    try {
        showStatus("Fetching summary...", "loading");

        const res = await fetch(`/summary?start=${start}&end=${end}`);
        const data = await res.json();

        document.getElementById("summaryResult").innerText =
            `Water: ${data.water} ml | Urine: ${data.urine} ml`;

        showStatus("Summary loaded successfully", "success");

    } catch {
        showStatus("Failed to fetch summary", "error");
    }
}

async function clearAll() {
    if (!confirm("Delete all entries?")) return;

    try {
        showStatus("Clearing all entries...", "loading");

        await fetch("/clear-all", {
            method: "POST"
        });

        await loadChart();

        document.getElementById("summaryResult").innerText = "";

        showStatus("All entries cleared", "success");

    } catch {
        showStatus("Failed to clear entries", "error");
    }
}

loadChart();
setInterval(loadChart, 5000);
</script>

</body>
</html>
